<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>

case 2:
document.write("Tuesday");
break;
default:
document.write("Invalid day");
}
</script>
